<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---- Theme variables ---- */
    [data-theme="dark"] {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: rgba(255,255,255,0.06);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --green: #22c55e;
      --yellow: #eab308;
      --blue: #3b82f6;
      --red: #ef4444;
      --bar-bg: rgba(255,255,255,0.06);
      --step-hover: rgba(255,255,255,0.03);
      --step-pending-bg: rgba(255,255,255,0.08);
      --tl-border: rgba(255,255,255,0.12);
      --tl-date-color: rgba(255,255,255,0.2);
      --toggle-bg: rgba(255,255,255,0.08);
      --toggle-hover: rgba(255,255,255,0.12);
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.1);
      --green: #16a34a;
      --yellow: #ca8a04;
      --blue: #2563eb;
      --red: #dc2626;
      --bar-bg: rgba(0,0,0,0.06);
      --step-hover: rgba(0,0,0,0.03);
      --step-pending-bg: rgba(0,0,0,0.06);
      --tl-border: rgba(0,0,0,0.12);
      --tl-date-color: rgba(0,0,0,0.3);
      --toggle-bg: rgba(0,0,0,0.06);
      --toggle-hover: rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #6366f1);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s ease infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.4rem;
    }

    /* Theme toggle */
    .theme-toggle {
      position: absolute;
      top: 0;
      right: 0;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: var(--toggle-bg);
      color: var(--text-muted);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
      transform: scale(1.08);
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.6rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }

    .card:hover {
      border-color: rgba(99,102,241,0.2);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.3rem; line-height: 1.5; }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* Progress bar */
    .progress-wrap { cursor: pointer; margin-bottom: 0.3rem; }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }

    .progress-pct { font-size: 0.8rem; font-weight: 600; color: var(--accent); }
    .progress-hint { font-size: 0.7rem; color: var(--text-muted); }

    .bar-track {
      height: 8px;
      background: var(--bar-bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .bar-fill.low  { background: linear-gradient(90deg, #c2410c, #ea580c); }
    .bar-fill.mid  { background: linear-gradient(90deg, #ea580c, #f59e0b); }
    .bar-fill.high { background: linear-gradient(90deg, #f59e0b, #22c55e); }
    .bar-fill.full { background: linear-gradient(90deg, #16a34a, #4ade80); }

    /* Steps dropdown */
    .steps-panel { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .steps-panel.open { max-height: 320px; }

    .steps {
      list-style: none;
      padding: 0.5rem 0 0.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .steps li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.82rem;
      transition: background 0.2s;
    }

    .steps li:hover { background: var(--step-hover); }

    .dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-done    .dot { background: var(--green); color: #fff; }
    .step-current .dot { background: var(--yellow); color: #333; }
    .step-pending .dot { background: var(--step-pending-bg); color: var(--text-muted); }
    .step-pending span:last-child { color: var(--text-muted); }

    /* Timeline */
    .timeline-section { margin-top: 1.4rem; }
    .venue-name { font-size: 0.8rem; font-weight: 600; color: var(--blue); margin-bottom: 0.6rem; }

    .timeline { display: flex; position: relative; padding: 0 0.25rem; }

    .tl-track {
      position: absolute; top: 9px; left: 0; right: 0;
      height: 3px; background: var(--bar-bg); border-radius: 2px;
    }

    .tl-fill {
      position: absolute; top: 9px; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #1e3a5f, #1d4ed8, #3b82f6, #60a5fa, #93c5fd);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .tl-event {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; position: relative; z-index: 2;
    }

    .tl-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2.5px solid var(--tl-border);
      background: var(--card);
      margin-bottom: 0.45rem;
      transition: all 0.3s;
    }

    .tl-dot.past    { background: #3b82f6; border-color: #3b82f6; }
    .tl-dot.current { background: var(--card); border-color: #60a5fa; box-shadow: 0 0 0 4px rgba(96,165,250,0.25); }
    .tl-dot.future  { background: var(--card); border-color: var(--tl-border); }

    .tl-label { font-size: 0.65rem; text-align: center; color: var(--text-muted); line-height: 1.25; max-width: 72px; }
    .tl-label.past-label    { color: var(--text); }
    .tl-label.current-label { color: #60a5fa; font-weight: 600; }
    .tl-date { font-size: 0.6rem; color: var(--tl-date-color); margin-top: 0.15rem; }

    @media (max-width: 600px) {
      .page { padding: 2rem 1rem; }
      .tl-label { font-size: 0.58rem; max-width: 56px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Project Tracking</h1>
      <p>Updated <span id="update-date"></span></p>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" id="theme-btn"></button>
    </div>
    <div id="projects-container"></div>
  </div>

  <script>
    // ---- Theme toggle ----
    function getTheme() {
      return localStorage.getItem("theme") || "dark";
    }

    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      document.getElementById("theme-btn").textContent = t === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
    }

    function toggleTheme() {
      const next = getTheme() === "dark" ? "light" : "dark";
      localStorage.setItem("theme", next);
      applyTheme(next);
    }

    applyTheme(getTheme());

    // ---- Load projects from projects/ directory ----
    async function loadProjects() {
      const indexRes = await fetch("projects/index.json");
      const files = await indexRes.json();
      const projects = await Promise.all(
        files.map(f => fetch(`projects/${f}`).then(r => r.json()))
      );
      return projects;
    }

    const ICONS = { done: "\u2713", current: "\u25B8", pending: "\u2022" };

    function progress(steps) {
      const w = { done: 1, current: 0.5, pending: 0 };
      return Math.round(steps.reduce((s, st) => s + (w[st.status]||0), 0) / steps.length * 100);
    }

    function barClass(p) {
      if (p >= 100) return "full";
      if (p >= 66)  return "high";
      if (p >= 33)  return "mid";
      return "low";
    }

    function tlStatus(events) {
      const today = new Date(); today.setHours(0,0,0,0);
      return events.map((ev, i) => {
        const d = new Date(ev.date+"T00:00:00");
        const nx = i < events.length-1 ? new Date(events[i+1].date+"T00:00:00") : null;
        let s = today >= d ? (nx === null || today < nx ? "current" : "past") : "future";
        return { ...ev, status: s };
      });
    }

    function tlFill(events) {
      const today = new Date(); today.setHours(0,0,0,0);
      const dates = events.map(e => new Date(e.date+"T00:00:00"));
      if (today <= dates[0]) return 0;
      if (today >= dates[dates.length-1]) return 100;
      for (let i = 0; i < dates.length-1; i++) {
        if (today >= dates[i] && today < dates[i+1]) {
          const a = i/(dates.length-1)*100, b = (i+1)/(dates.length-1)*100;
          return a + (today-dates[i])/(dates[i+1]-dates[i])*(b-a);
        }
      }
      return 0;
    }

    function fmtDate(s) {
      return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
    }

    function toggle(id) { document.getElementById(id).classList.toggle("open"); }

    function render(projects) {
      document.getElementById("projects-container").innerHTML = projects.map((p, i) => {
        const pct = progress(p.steps);
        const tl = tlStatus(p.timeline);
        const fill = tlFill(p.timeline);
        const sid = `s${i}`;
        return `
        <div class="card">
          <div class="card-title">${p.name}</div>
          <div class="card-desc">${p.description}</div>

          <div class="section-label">Project Progress</div>
          <div class="progress-wrap" onclick="toggle('${sid}')">
            <div class="progress-top">
              <span class="progress-hint">Click to expand</span>
              <span class="progress-pct">${pct}%</span>
            </div>
            <div class="bar-track"><div class="bar-fill ${barClass(pct)}" style="width:${pct}%"></div></div>
          </div>
          <div class="steps-panel" id="${sid}">
            <ul class="steps">
              ${p.steps.map(s=>`<li class="step-${s.status}"><span class="dot">${ICONS[s.status]}</span><span>${s.label}</span></li>`).join("")}
            </ul>
          </div>

          <div class="timeline-section">
            <div class="section-label">Venue Submission</div>
            <div class="venue-name">${p.venue}</div>
            <div class="timeline">
              <div class="tl-track"></div>
              <div class="tl-fill" style="width:${fill}%"></div>
              ${tl.map(ev=>`
                <div class="tl-event">
                  <div class="tl-dot ${ev.status}"></div>
                  <div class="tl-label ${ev.status}-label">${ev.label}</div>
                  <div class="tl-date">${fmtDate(ev.date)}</div>
                </div>`).join("")}
            </div>
          </div>
        </div>`;
      }).join("");
    }

    document.getElementById("update-date").textContent = new Date().toLocaleDateString();
    loadProjects().then(render);
  </script>
</body>
</html>
